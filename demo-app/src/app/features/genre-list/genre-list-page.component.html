<mat-toolbar color="primary" class="main-toolbar">
  <div class="toolbar-content">
    <span class="brand">Library Admin</span>

    <nav class="nav-links">
      <a mat-button routerLink="/people" routerLinkActive="active-link">
        <mat-icon>people</mat-icon> People
      </a>
      <a mat-button routerLink="/books" routerLinkActive="active-link">
        <mat-icon>book</mat-icon> Books
      </a>
      <a mat-button routerLink="/genres" routerLinkActive="active-link">
        <mat-icon>category</mat-icon> Genres
      </a>
    </nav>
  </div>
</mat-toolbar>

<main class="content">
  <header class="page-header">
    <div>
      <h1 class="page-title">Manage Genres</h1>
      <p class="page-subtitle">View, create, and delete book genres.</p>
    </div>
    <div class="header-actions">
      <button mat-flat-button (click)="openCreateDialog()" aria-label="Add new genre" [disabled]="isLoading()">
        <mat-icon>add</mat-icon>
        New Genre
      </button>
    </div>
  </header>

  @if (isLoading()) {
  <p class="loading-status" role="status" aria-live="polite">Loading genres...</p>
  }

  <div class="table-container" role="region" aria-label="Genre list" [attr.aria-busy]="isLoading()"
    [class.is-busy]="isLoading()">
    <table mat-table [dataSource]="genres()" aria-label="Genres table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef scope="col">Name</th>
        <td mat-cell *matCellDef="let genre">{{ genre.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef scope="col">Actions</th>
        <td mat-cell *matCellDef="let genre">
          <button mat-icon-button (click)="editGenre(genre)" [disabled]="isLoading()" color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteGenre(genre)" [attr.aria-label]="'Delete ' + genre.name"
            class="delete-btn" [disabled]="isLoading()">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-mdc-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length" class="no-data-cell">
          No genres found. Click "New Genre" to add one.
        </td>
      </tr>
    </table>
  </div>
</main>
