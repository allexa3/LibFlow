<mat-toolbar color="primary">
  <span>Library Admin</span>
  <nav class="nav-links">
    <a mat-button routerLink="/persons" routerLinkActive="active-link">People</a>
    <a mat-button routerLink="/books" routerLinkActive="active-link">Books</a>
    <a mat-button routerLink="/genres" routerLinkActive="active-link">Genres</a>
  </nav>
</mat-toolbar>

<main class="content">
  <header class="page-header">
    <div>
      <h1 class="page-title">Manage Genres</h1>
      <p class="page-subtitle">View, create, and delete book genres.</p>
    </div>
    <button mat-flat-button (click)="openCreateDialog()" [disabled]="isLoading()">
      <mat-icon>add</mat-icon> New Genre
    </button>
  </header>

  <div class="table-container" [class.is-busy]="isLoading()">
    <table mat-table [dataSource]="genres()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let genre">{{ genre.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let genre">
          <button mat-icon-button color="warn" (click)="deleteGenre(genre)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</main>
